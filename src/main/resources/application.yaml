spring:
  application:
    name: TransitHub
  datasource:
    url: jdbc:postgresql://localhost:5432/db_name
    username: db_user
    password: db_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect